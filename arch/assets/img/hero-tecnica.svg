<svg viewBox="0 0 900 1300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="gridTecnica" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0 H0 V34" fill="none" stroke="#1A1A18" stroke-width="1" opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="900" height="1300" fill="#F2F1EE"/>
  <rect width="900" height="1300" fill="url(#gridTecnica)"/>

  <!-- Pianta: muri perimetrali e divisori -->
  <g stroke="#1A1A18" fill="none">
    <rect x="140" y="260" width="620" height="760" stroke-width="6"/>
    <!-- divisori interni -->
    <line x1="140" y1="560" x2="480" y2="560" stroke-width="3"/>
    <line x1="480" y1="260" x2="480" y2="560" stroke-width="3"/>
    <line x1="480" y1="740" x2="760" y2="740" stroke-width="3"/>
    <line x1="560" y1="560" x2="560" y2="1020" stroke-width="3"/>

    <!-- porte con arco di apertura -->
    <path d="M300 560 A70 70 0 0 1 300 630" stroke-width="1.5" stroke-dasharray="3 4"/>
    <line x1="270" y1="560" x2="330" y2="560" stroke-width="4" stroke="#F2F1EE"/>
    <path d="M480 660 A60 60 0 0 0 540 660" stroke-width="1.5" stroke-dasharray="3 4"/>
    <line x1="480" y1="640" x2="480" y2="690" stroke-width="4" stroke="#F2F1EE"/>

    <!-- scala -->
    <g stroke-width="2">
      <line x1="620" y1="800" x2="620" y2="960" />
      <line x1="600" y1="815" x2="750" y2="815"/>
      <line x1="600" y1="845" x2="750" y2="845"/>
      <line x1="600" y1="875" x2="750" y2="875"/>
      <line x1="600" y1="905" x2="750" y2="905"/>
      <line x1="600" y1="935" x2="750" y2="935"/>
      <path d="M610 800 L750 800" stroke-width="3"/>
      <path d="M700 960 l40 -40" stroke-width="2"/>
    </g>

    <!-- finestre -->
    <line x1="220" y1="260" x2="300" y2="260" stroke-width="6" stroke="#F2F1EE"/>
    <line x1="220" y1="255" x2="300" y2="255" stroke-width="2"/>
    <line x1="220" y1="265" x2="300" y2="265" stroke-width="2"/>
    <line x1="600" y1="260" x2="700" y2="260" stroke-width="6" stroke="#F2F1EE"/>
    <line x1="600" y1="255" x2="700" y2="255" stroke-width="2"/>
    <line x1="600" y1="265" x2="700" y2="265" stroke-width="2"/>
  </g>

  <!-- Quote di disegno tecnico -->
  <g stroke="#1A1A18" stroke-width="1" font-family="monospace" fill="#1A1A18">
    <line x1="140" y1="1060" x2="760" y2="1060"/>
    <line x1="140" y1="1050" x2="140" y2="1070"/>
    <line x1="760" y1="1050" x2="760" y2="1070"/>
    <text x="410" y="1090" font-size="18" text-anchor="middle" letter-spacing="1">6,20 m</text>

    <line x1="98" y1="260" x2="98" y2="1020"/>
    <line x1="88" y1="260" x2="108" y2="260"/>
    <line x1="88" y1="1020" x2="108" y2="1020"/>
    <text x="70" y="640" font-size="18" text-anchor="middle" letter-spacing="1" transform="rotate(-90 70 640)">7,60 m</text>
  </g>

  <!-- Freccia nord -->
  <g transform="translate(800,150)" stroke="#1A1A18" fill="none" stroke-width="2">
    <circle r="34" opacity="0.5"/>
    <path d="M0 -26 L10 10 L0 0 L-10 10 Z" fill="#1A1A18" stroke="none"/>
    <text x="0" y="-38" font-family="monospace" font-size="14" text-anchor="middle" fill="#1A1A18" stroke="none">N</text>
  </g>

  <!-- Etichetta tavola -->
  <g font-family="monospace" fill="#1A1A18" opacity="0.65">
    <text x="60" y="90" font-size="18" letter-spacing="3">TAV. 02 — PIANTA PIANO TERRA</text>
    <line x1="60" y1="105" x2="360" y2="105" stroke="#1A1A18" stroke-width="1"/>
  </g>
</svg>
