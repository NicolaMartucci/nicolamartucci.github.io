<svg viewBox="0 0 900 1300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyImpresa" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a4238"/>
      <stop offset="45%" stop-color="#2c2b27"/>
      <stop offset="100%" stop-color="#17160f"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="72%" cy="10%" r="55%">
      <stop offset="0%" stop-color="#e8b46a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#e8b46a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="900" height="1300" fill="url(#skyImpresa)"/>
  <rect width="900" height="1300" fill="url(#sunGlow)"/>

  <!-- Sagoma edificio in costruzione: griglia di travi e pilastri -->
  <g stroke="#EDEBE6" stroke-width="4" fill="none" opacity="0.9">
    <!-- pilastri -->
    <line x1="180" y1="420" x2="180" y2="1180"/>
    <line x1="340" y1="360" x2="340" y2="1180"/>
    <line x1="500" y1="360" x2="500" y2="1180"/>
    <line x1="660" y1="420" x2="660" y2="1180"/>
    <!-- solai (travi orizzontali) -->
    <line x1="150" y1="1180" x2="700" y2="1180"/>
    <line x1="160" y1="990" x2="690" y2="990"/>
    <line x1="170" y1="800" x2="680" y2="800"/>
    <line x1="180" y1="610" x2="670" y2="610"/>
    <line x1="200" y1="420" x2="650" y2="420"/>
    <!-- controventi diagonali -->
    <line x1="180" y1="990" x2="340" y2="800"/>
    <line x1="340" y1="800" x2="500" y2="990"/>
    <line x1="500" y1="990" x2="660" y2="800"/>
    <line x1="180" y1="800" x2="340" y2="610"/>
    <line x1="500" y1="610" x2="660" y2="800"/>
  </g>

  <!-- Gru edile stilizzata -->
  <g stroke="#EDEBE6" stroke-width="5" fill="none" stroke-linecap="round">
    <line x1="760" y1="1180" x2="760" y2="230"/>
    <line x1="760" y1="230" x2="880" y2="230"/>
    <line x1="760" y1="230" x2="700" y2="270"/>
    <line x1="700" y1="270" x2="760" y2="300"/>
    <line x1="620" y1="230" x2="760" y2="230"/>
    <line x1="700" y1="230" x2="700" y2="480"/>
    <line x1="700" y1="480" x2="700" y2="520"/>
  </g>
  <circle cx="700" cy="525" r="6" fill="#EDEBE6"/>

  <!-- Rotolo di elaborati e casco, in primo piano -->
  <g>
    <ellipse cx="160" cy="1230" rx="90" ry="20" fill="#000" opacity="0.25"/>
    <path d="M90 1170 q70 -55 140 0 v40 q-70 -40 -140 0 z" fill="#EDEBE6" opacity="0.92"/>
    <rect x="88" y="1205" width="144" height="10" rx="5" fill="#EDEBE6" opacity="0.5"/>
  </g>

  <!-- Etichetta tecnica in stile cantiere -->
  <g font-family="monospace" fill="#EDEBE6" opacity="0.55">
    <text x="60" y="90" font-size="18" letter-spacing="3">CANTIERE — LOTTO 04</text>
    <line x1="60" y1="105" x2="220" y2="105" stroke="#EDEBE6" stroke-width="1"/>
  </g>
</svg>
