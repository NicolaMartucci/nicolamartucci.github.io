<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TuttoApricena</title>
<link rel="stylesheet" href="../../assets/css/style.css"/>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
<header id="navbar"><div class="navbar-inner"><div class="navbar-row"><a href="../../" class="navbar-logo"><div class="navbar-logo-icon"><span>TA</span></div><span class="navbar-logo-text">Tutto<em>Apricena</em></span></a><nav class="navbar-links"><a href="../../notizie/">Notizie</a><a href="../../eventi/" class="active">Eventi</a><a href="../../farmacie/">Farmacie</a><a href="../../servizi/">Servizi</a><a href="../../locali/">Locali</a><a href="../../sponsor/">Sponsor</a></nav><div class="navbar-actions"><a href="../../chi-siamo/" class="link-plain">Chi siamo</a><a href="../../contatti/" class="link-btn">Contatti</a></div><button id="mobile-menu-btn" class="mobile-menu-btn" aria-label="Menu"><i data-lucide="menu" width="24" height="24"></i></button></div></div></header>
<main id="pg-main" style="padding-top:72px;min-height:80vh"></main>
<footer><div class="footer-inner"><div class="footer-grid"><div class="footer-brand"><a href="../../" class="navbar-logo"><div class="navbar-logo-icon"><span>TA</span></div><span class="navbar-logo-text">Tutto<em>Apricena</em></span></a></div><div class="footer-col"><h4>Sezioni</h4><ul><li><a href="../../notizie/">Notizie</a></li><li><a href="../../eventi/">Eventi</a></li><li><a href="../../locali/">Locali</a></li></ul></div></div><div class="footer-bottom"><p>© TuttoApricena</p></div></div></footer>
<script src="../../assets/js/data.js"></script><script src="../../assets/js/main.js"></script>
<script>
var parts=window.location.pathname.replace(/\/$/,"").split("/");
var slug=parts[parts.length-1];
var qs=new URLSearchParams(window.location.search);
if(qs.get("slug"))slug=qs.get("slug");
var cc=function(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");};
var fmt=function(d){try{return new Date(d).toLocaleDateString("it-IT",{day:"numeric",month:"long",year:"numeric"});}catch(e){return d||"";}};
var main=document.getElementById("pg-main");
try{var sk={notizie:"ta_n",eventi:"ta_e",locali:"ta_l"};
Object.keys(sk).forEach(function(k){try{var raw=sessionStorage.getItem(sk[k]);if(raw){var items=JSON.parse(raw);if(Array.isArray(items)){var slugs=(TA[k]||[]).map(function(x){return x.slug;});items.forEach(function(it){var i=slugs.indexOf(it.slug);if(i>=0){TA[k][i]=it;}else{TA[k]=(TA[k]||[]).concat([it]);slugs.push(it.slug);}});}}}catch(e){}});}catch(e){}
var item=(TA.eventi||[]).find(function(x){return x.slug===slug;});
if(!item){main.innerHTML='<div style="padding:80px 24px;text-align:center"><h2>Evento non trovato</h2><p>Questo evento non è disponibile.</p><a href="../../eventi/" class="btn-primary" style="margin-top:16px">← Tutti gli eventi</a></div>';lucide.createIcons();}
else{
  document.title=item.titolo+" — TuttoApricena";
  var multi=item.dataFine&&item.dataFine!==item.dataInizio;
  var ticketBtn=item.ticketUrl
    ?'<a href="'+item.ticketUrl+'" target="_blank" rel="noopener" class="btn-primary" style="display:inline-flex;align-items:center;gap:8px;margin-top:24px;font-size:15px;padding:13px 28px"><i data-lucide="ticket" width="18" height="18"></i> Acquista biglietti</a>'
    :"";
  main.innerHTML=
    '<div class="article-header"><div class="article-header-inner">'+
    '<a href="../../eventi/" class="back-link"><i data-lucide="arrow-left" width="16" height="16"></i> Tutti gli eventi</a>'+
    '<div class="article-meta"><span class="cat-badge" style="background:var(--color-accent);color:var(--color-primary)">'+cc(item.categoria||"Evento")+'</span></div>'+
    '<h1 class="article-title">'+cc(item.titolo)+'</h1>'+
    '<div class="article-info">'+
    '<i data-lucide="calendar" width="13" height="13"></i> '+fmt(item.dataInizio)+(multi?" — "+fmt(item.dataFine):"")+
    ' &nbsp;·&nbsp; <i data-lucide="clock" width="13" height="13"></i> '+cc(item.orario||"")+
    ' &nbsp;·&nbsp; <i data-lucide="map-pin" width="13" height="13"></i> '+cc(item.luogo||"")+
    '</div></div></div>'+
    '<div class="article-body">'+
    (item.immagine?'<img class="article-img" src="'+item.immagine+'" alt="'+cc(item.titolo)+'" onerror="this.style.display=\'none\'">':"")+"<div class="prose-content"><p style="font-size:17px;line-height:1.8">"+cc(item.descrizione||"")+"</p></div>"+
    '<div style="background:#fff;border-radius:16px;padding:24px;margin-top:28px;box-shadow:0 4px 20px rgba(26,26,46,.07);display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:18px">'+
    '<div><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--color-text-muted);margin-bottom:4px">Data</div><strong>'+fmt(item.dataInizio)+(multi?" – "+fmt(item.dataFine):"")+'</strong></div>'+
    '<div><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--color-text-muted);margin-bottom:4px">Orario</div><strong>'+cc(item.orario||"Da definire")+'</strong></div>'+
    '<div><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--color-text-muted);margin-bottom:4px">Luogo</div><strong>'+cc(item.luogo||"Da definire")+'</strong></div>'+
    '</div>'+ticketBtn+"</div>";
  lucide.createIcons();
}
</script>
</body>
</html>
