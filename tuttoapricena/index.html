<!-- CARICAMENTO DATI CMS - TuttoApricena -->
<!-- ══════════════════════════════════════════════════════════════════════════════ -->
<script>
(function() {
  console.log('🔄 TuttoApricena - Caricamento dati CMS...');
  
  const dataUrl = '/tuttoapricena/assets/data.json';
  const cacheBuster = '?t=' + Date.now();
  
  fetch(dataUrl + cacheBuster)
    .then(response => {
      console.log('📡 Risposta ricevuta:', response.status, response.statusText);
      
      if (!response.ok) {
        throw new Error('Errore HTTP ' + response.status + ' - Il file data.json potrebbe non esistere ancora');
      }
      
      return response.json();
    })
    .then(data => {
      console.log('✅ Dati CMS caricati con successo!');
      console.log('📊 Statistiche:');
      console.log('  - Notizie:', (data.notizie || []).length);
      console.log('  - Eventi:', (data.eventi || []).length);
      console.log('  - Sponsor:', (data.sponsor || []).length);
      console.log('📦 Oggetto completo:', data);
      
      // Rende i dati disponibili globalmente
      window.TA_DATA = data;
      
      // Dispatch evento per notificare che i dati sono pronti
      const event = new CustomEvent('ta-ready', { detail: data });
      document.dispatchEvent(event);
      
      console.log('🎉 Evento "ta-ready" dispatched - I componenti React possono ora usare window.TA_DATA');
    })
    .catch(error => {
      console.error('❌ Errore caricamento dati CMS:', error.message);
      console.warn('💡 Soluzione: Pubblica i dati dal CMS (admin.html) cliccando "Pubblica sul sito"');
      
      // Fallback: dati vuoti per evitare errori nell'app
      window.TA_DATA = {
        identita: { nome: 'TuttoApricena', tag: 'Il portale di Apricena' },
        notizie: [],
        eventi: [],
        sponsor: [],
        hero: {},
        footer: {},
        layout: { sections: [] }
      };
      
      // Dispatch evento anche in caso di errore (con dati vuoti)
      document.dispatchEvent(new Event('ta-ready'));
    });
})();
</script>

<script>
document.addEventListener('ta-ready', function() {
  console.log('🎯 Evento ta-ready ricevuto!');
  console.log('🔍 window.TA_DATA disponibile:', !!window.TA_DATA);
  
  if (window.TA_DATA) {
    console.table({
      'Notizie': (window.TA_DATA.notizie || []).length,
      'Eventi': (window.TA_DATA.eventi || []).length,
      'Sponsor': (window.TA_DATA.sponsor || []).length
    });
  }
});
</script>
