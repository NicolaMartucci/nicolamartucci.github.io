<html lang="it">
  <head>
    <meta charset="UTF-8" />

    <meta name="description" content="TuttoApricena - Il portale informativo di Apricena. Notizie, eventi, servizi, locali e molto altro." />
    <title>TuttoApricena — Il portale di Apricena</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <link rel="stylesheet" crossorigin href="/tuttoapricena/assets/index-BaybhRHq.css">
  </head>
  <body>
    <div id="root"></div>
<script>
(function(){
  fetch('/tuttoapricena/assets/data.json?t='+Date.now())
    .then(r=>r.ok?r.json():null)
    .then(d=>{if(d)window.TA_DATA=d;document.dispatchEvent(new Event('ta-ready'));})
    .catch(()=>{});
})();
</script>

<script>
document.addEventListener('ta-ready', function() {
  const dati = window.TA_DATA;
  
  // Esempio: mostra notizie
  const notizie = dati.notizie || [];
  const container = document.getElementById('notizie-lista');
  if (container) {
    container.innerHTML = notizie
      .filter(n => n.status === 'pubblicata')
      .slice(0, 6)
      .map(n => `
        <article>
          <h3>${n.title}</h3>
          <p>${n.summary}</p>
        </article>
      `).join('');
  }
});
</script>
  </body>
</html>
