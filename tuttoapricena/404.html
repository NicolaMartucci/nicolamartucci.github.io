<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TuttoApricena</title>
  <script>
    // Salva il path completo e reindirizza a index.html
    var path = window.location.pathname;
    var search = window.location.search;
    var hash = window.location.hash;
    sessionStorage.setItem('spa_redirect', path + search + hash);
    window.location.replace('/tuttoapricena/');
  </script>
</head>
<body></body>
</html>
